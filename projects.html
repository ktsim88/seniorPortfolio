<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Kristen Tsim</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/zkp7qte.css" />
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-md navbar-light bg-light">
        <div class="container">
          <a class="navbar-brand" href="index.html">
            <img
              src="imgs/KTLogo.PNG"
              alt="Logo"
              width="50"
              class="d-inline-block align-text-top"
            />
            Kristen Tsim
          </a>
          <button
            class="navbar-toggler d-lg-none"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapsibleNavId"
            aria-controls="collapsibleNavId"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="collapsibleNavId">
            <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="about.html" aria-current="page"
                  >About
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="projects.html">Projects</a>
              </li>
              <li class="nav-item">
                <a
                  class="btn nav-link"
                  data-bs-toggle="modal"
                  data-bs-target="#exampleModal"
                  >Contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main
      class="container text-center align-items-center justify-content-center"
      id="app"
    >
      <div id="miniSite">
        <h1>Projects</h1>
        <div class="row">
          <div class="col-md-2 col-sm-12">
            <div
              class="btn-group-vertical"
              role="group"
              aria-label="Vertical radio toggle button group"
            >
              <input
                type="radio"
                class="btn-check"
                name="vbtn-radio"
                id="vbtn-radio1"
                autocomplete="off"
                checked
              />
              <label class="btn btn-outline-danger" for="vbtn-radio1"
                >Radio 1</label>
              <input
                type="radio"
                class="btn-check"
                name="vbtn-radio"
                id="vbtn-radio2"
                autocomplete="off"
              />
              <label class="btn btn-outline-danger" for="vbtn-radio2"
                >Radio 2</label>
              
            </div>
          </div>
          <div class="col-md-10 col-sm-12">
            <!-- Project icons, will be generated using vue later -->

<a class="btn" role="button" v-for="zeroniIcon in zeroniIcons">
  
  <div class="zeroniCard">
  <img :src="zeroniIcon.zeroni" class="card-img-top zeroniPics" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{ zeroniIcon.projectName }}</h5>  
</div>
</div>
</a>


            
          </div>
          
        </div>
      </div>

      <!-- Modal to contact me -->
      <div
        class="modal fade"
        id="exampleModal"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">
                Modal title
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">...</div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button type="button" class="btn btn-primary">
                Save changes
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- end of modal -->
    </main>
    <footer class="fixed-bottom">
      <!-- place footer here -->
      <footer
        class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"
      >
        <div class="col-md-4 d-flex align-items-center">
          <a
            href="/"
            class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1"
            aria-label="Bootstrap"
          >
            <svg class="bi" width="30" height="24" aria-hidden="true">
              <use xlink:href="#bootstrap"></use>
            </svg>
          </a>
          <span class="mb-3 mb-md-0 text-body-secondary"
            >© Kristen Tsim, Inc</span
          >
        </div>
        <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
          <li class="ms-3">
            <a class="text-body-secondary" href="#" aria-label="Instagram"
              ><svg class="bi" width="24" height="24" aria-hidden="true">
                <use xlink:href="#instagram"></use></svg></a>
          </li>
          <li class="ms-3">
            <a class="text-body-secondary" href="#" aria-label="Facebook"
              ><svg class="bi" width="24" height="24">
                <use xlink:href="#facebook"></use></svg>
              </a>
          </li>
        </ul>
      </footer>
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
     <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
